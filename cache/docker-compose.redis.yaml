version: "3.8"

services:
  redis:
    image: redis:7
    container_name: redis

    ports:
      - "6379:6379" # Porta padrão do Redis

    command: [
      "redis-server",
      "--requirepass", "123456789",      # Define senha
      "--appendonly", "yes"             # Habilita persistência (AOF - Append Only File)
    ]
    
    volumes:
      # Salva os dados em disco
      - redis-data:/data

    restart: unless-stopped
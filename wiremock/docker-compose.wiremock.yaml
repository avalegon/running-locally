version: "3.8"

services:
  wiremock:
    image: wiremock/wiremock:3.5.2
    container_name: wiremock

    ports:
      - "8089:8080" # acessa via localhost:8089

    volumes:
      # Onde ficam os mocks (requests/responses)
      - wiremock-data:/home/wiremock

    command: [
      "--verbose",
      "--global-response-templating"
    ]

    restart: unless-stopped
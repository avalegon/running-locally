version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017" # Porta padrão do MongoDB

    environment:
      # Usuário root (admin do banco)
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456789

      # (Opcional) cria um banco inicial
      MONGO_INITDB_DATABASE: appdb

    volumes:
      # Persistência de dados (não perde ao parar o container)
      - mongo-data:/data/db

    restart: unless-stopped

volumes:
  mongo-data: